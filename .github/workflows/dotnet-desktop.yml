name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/BF3LanReforged/BF3LanReforged.csproj

      # ----- Self-Contained (Single File) -----
      - name: Publish Self-Contained
        run: |
          dotnet publish src/BF3LanReforged/BF3LanReforged.csproj `
            -c Release `
            -o ./publish/self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:SelfContained=true

      - name: Copy bf3_offline.exe to self-contained folder
        run: copy .\src\PatchedLauncher\bf3_offline.exe .\publish\self-contained\

      - name: Create Self-Contained ZIP
        run: Compress-Archive -Path ./publish/self-contained/* -DestinationPath ./BF3_LAN_Launcher_SelfContained.zip

      # ----- Framework-Dependent (requires .NET runtime) -----
      - name: Publish Framework-Dependent
        run: |
          dotnet publish src/BF3LanReforged/BF3LanReforged.csproj `
            -c Release `
            -o ./publish/framework-dependent `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:SelfContained=false

      - name: Copy bf3_offline.exe to framework-dependent folder
        run: copy .\src\PatchedLauncher\bf3_offline.exe .\publish\framework-dependent\

      - name: Create Framework-Dependent ZIP
        run: Compress-Archive -Path ./publish/framework-dependent/* -DestinationPath ./BF3_LAN_Launcher_FrameworkDependent.zip

      # ----- Create Release with both ZIPs -----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            ./BF3_LAN_Launcher_SelfContained.zip
            ./BF3_LAN_Launcher_FrameworkDependent.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}